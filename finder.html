<!doctype html>
<html lang="tr">
<head>
  
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>İrlanda Planını Oluştur | YOLO Academic</title>
</head>
<body class="site">

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html" aria-label="YOLO Academic home">
      <span class="logo" aria-hidden="true"></span>
      <span class="brand-text">
        <span class="brand-name">YOLO Academic</span>
        <span class="brand-sub">You Only Live Once!</span>
      </span>
    </a>
    <div class="nav-right row wrap">
      <div class="tabs">
        <a class="tab " href="index.html" data-i18n="nav.home"></a>
        <a class="tab " href="services.html" data-i18n="nav.services"></a>
        <a class="tab active" href="finder.html" data-i18n="nav.finder"></a>
        <a class="tab " href="insights.html" data-i18n="nav.insights"></a>
        <a class="tab " href="sources.html" data-i18n="nav.about"></a>
      </div>
      <button id="langToggle" class="lang-toggle" type="button" aria-label="Change language">EN</button>
    </div>
  </div>
</nav>

<header class="container page-hero">
  <div class="eyebrow"><span class="lang-tr">İrlanda Planı</span><span class="lang-en">Ireland Plan</span></div>
  <h1 class="page-title" data-i18n="finder.h1"></h1>
  <p class="muted page-sub" data-i18n="finder.p"></p>
</header>
<main class="container" style="padding-bottom:60px;">
  <form id="prefsForm" class="card form">
    <div class="grid">
      <div class="field"><label for="educationType" data-i18n="form.educationType"></label><select id="educationType" required><option value="university" data-i18n="opt.education.university"></option><option value="language" data-i18n="opt.education.language"></option><option value="highschool" data-i18n="opt.education.highschool"></option></select></div>
      <div class="field"><label for="city" data-i18n="form.city"></label><select id="city"><option value="any" data-i18n="opt.any"></option><option value="dublin">Dublin</option><option value="cork">Cork</option><option value="galway">Galway</option><option value="limerick">Limerick</option><option value="other">Diğer / Other</option></select></div>
      <div class="field"><label for="degree" data-i18n="form.degree"></label><select id="degree"><option value="any" data-i18n="opt.any"></option><option value="ug" data-i18n="opt.ug"></option><option value="pg" data-i18n="opt.pg"></option><option value="foundation" data-i18n="opt.foundation"></option></select></div>
      <div class="field"><label for="field" data-i18n="form.field"></label><select id="field"><option value="any" data-i18n="opt.any"></option><option value="computing" data-i18n="opt.computing"></option><option value="business" data-i18n="opt.business"></option><option value="engineering" data-i18n="opt.engineering"></option><option value="health" data-i18n="opt.health"></option><option value="arts" data-i18n="opt.arts"></option><option value="english" data-i18n="opt.english"></option></select></div>
      <div class="field"><label for="goal" data-i18n="form.goal"></label><select id="goal" required><option value="balanced" data-i18n="opt.balanced"></option><option value="prestige" data-i18n="opt.prestige"></option><option value="value" data-i18n="opt.value"></option><option value="career" data-i18n="opt.career"></option><option value="fast" data-i18n="opt.fast"></option></select></div>
      <div class="field"><label for="tuitionMax" data-i18n="form.tuition"></label><select id="tuitionMax"><option value="" data-i18n="opt.any"></option><option value="5000">≤ €5k</option><option value="10000">≤ €10k</option><option value="20000">≤ €20k</option><option value="35000">≤ €35k</option><option value="999999">€35k+</option></select></div>
      <div class="field"><label for="hasIelts" data-i18n="form.ielts"></label><select id="hasIelts"><option value="any" data-i18n="opt.ielts.any"></option><option value="yes" data-i18n="opt.ielts.yes"></option><option value="no" data-i18n="opt.ielts.no"></option></select></div>
      <div class="field" id="ieltsWrap" style="display:none;"><label for="ieltsScore" data-i18n="form.ieltsScore"></label><select id="ieltsScore"><option value="" data-i18n="opt.any"></option><option value="5.0">5.0</option><option value="5.5">5.5</option><option value="6.0">6.0</option><option value="6.5">6.5</option><option value="7.0">7.0</option><option value="7.5">7.5</option></select></div>
      <div class="field"><label for="gpa" data-i18n="form.gpa"></label><input id="gpa" type="text" inputmode="decimal" placeholder="örn. 3.10" /><div class="hint muted small" data-i18n="form.gpaHint"></div></div>
      <div class="field"><label for="intake" data-i18n="form.intake"></label><select id="intake"><option value="any" data-i18n="opt.any"></option><option value="sep" data-i18n="opt.sep"></option><option value="jan" data-i18n="opt.jan"></option><option value="summer" data-i18n="opt.summer"></option><option value="flexible" data-i18n="opt.flexible"></option></select></div>
      <div class="field"><label for="year" data-i18n="form.year"></label><select id="year"><option value="any" data-i18n="opt.year.any"></option></select></div>
      <div class="field"><label for="accommodation" data-i18n="form.accommodation"></label><select id="accommodation"><option value="any" data-i18n="opt.any"></option><option value="yes" data-i18n="opt.yes"></option><option value="no" data-i18n="opt.no"></option></select></div>
      <div class="field"><label for="notes" data-i18n="form.notes"></label><input id="notes" type="text" data-i18n-placeholder="form.notesPh" /></div>
    </div>
    <div class="actions row wrap"><button class="btn primary" type="submit" data-i18n="form.submit"></button><a class="btn ghost" data-calendly href="#" data-i18n="call.btn"></a></div>
  </form>
</main>

<script src="assets/i18n.js"></script>
<script src="assets/mobile-nav.js?v=2"></script>
<script src="assets/config.js"></script>
<script src="assets/calendly.js"></script>
<script src="assets/tawk.js"></script>

<script src="assets/app.js"></script>
</body>
</html>
