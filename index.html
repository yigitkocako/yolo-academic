<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YOLO Academic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="site">
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html" aria-label="YOLO Academic home">
        <span class="logo" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-name">YOLO Academic</span>
          <span class="brand-sub">Academic Consultancy</span>
        </span>
      </a>

      <div class="nav-right row wrap">
        <div class="tabs">
          <a class="tab active" href="index.html" data-i18n="nav.home"></a>
          <a class="tab" href="finder.html" data-i18n="nav.finder"></a>
          <a class="tab" href="results.html" data-i18n="nav.results"></a>
          <a class="tab" href="insights.html" data-i18n="nav.insights"></a>
          <a class="tab" href="sources.html" data-i18n="nav.about"></a>
        </div>
		<button id="menuToggle" class="menu-toggle" type="button">☰</button>
        <button id="langToggle" class="lang-toggle" type="button" aria-label="Change language">EN</button>
      </div>
    </div>
  </nav>


  <header class="hero-slider" aria-label="Hero">
    <div class="hero-slides" data-hero-slides>
      <!-- Put hero images in /assets as hero-1.jpg, hero-2.jpg, hero-3.jpg (and more if you want) -->
      <div class="hero-slide is-active" style="background-image:url('assets/hero-1.jpg')"></div>
      <div class="hero-slide" style="background-image:url('assets/hero-2.jpg')"></div>
      <div class="hero-slide" style="background-image:url('assets/hero-3.jpg')"></div>
    </div>

    <div class="hero-grad" aria-hidden="true"></div>

    <div class="container hero-content">
      <div class="hero-kicker" data-i18n="landing.kicker"></div>
      <h1 class="hero-title" data-i18n="landing.h1"></h1>
      <p class="hero-text" data-i18n="landing.p"></p>

      <div class="trust-chips">
        <span class="chip" data-i18n="landing.trust.1"></span>
        <span class="chip" data-i18n="landing.trust.2"></span>
        <span class="chip" data-i18n="landing.trust.3"></span>
      </div>

      <div class="hero-actions">
        <a class="btn primary" href="finder.html" data-i18n="landing.cta.start"></a>
        <a class="btn ghost" data-calendly href="#" data-i18n="call.btn"></a>
      </div>

      <div class="hero-dots" data-hero-dots aria-label="Slide controls"></div>
    </div>
  </header>

  <main>
    <section class="section section-light">
      <div class="container">
        <div class="section-head">
          <h2 data-i18n="services.title"></h2>
          <p class="muted" data-i18n="services.sub"></p>
        </div>

        <div class="cards-4">
          <div class="card soft">
            <h3 data-i18n="svc.1.t"></h3>
            <p class="muted small" data-i18n="svc.1.p"></p>
          </div>
          <div class="card soft">
            <h3 data-i18n="svc.2.t"></h3>
            <p class="muted small" data-i18n="svc.2.p"></p>
          </div>
          <div class="card soft">
            <h3 data-i18n="svc.3.t"></h3>
            <p class="muted small" data-i18n="svc.3.p"></p>
          </div>
          <div class="card soft">
            <h3 data-i18n="svc.4.t"></h3>
            <p class="muted small" data-i18n="svc.4.p"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="section section-white">
      <div class="container grid-2">
        <div class="card">
          <h2 data-i18n="tool.title"></h2>
          <p class="muted" data-i18n="tool.p"></p>
          <div class="row wrap" style="margin-top:10px;">
            <a class="btn primary" href="finder.html" data-i18n="tool.try"></a>
            <a class="btn" href="sources.html" data-i18n="tool.about"></a>
          </div>
        </div>

        <div class="card">
          <h2 data-i18n="how.title"></h2>
          <div class="stack">
            <div class="item">
              <h3 data-i18n="how.1.t"></h3>
              <p class="muted small" data-i18n="how.1.p"></p>
            </div>
            <div class="item">
              <h3 data-i18n="how.2.t"></h3>
              <p class="muted small" data-i18n="how.2.p"></p>
            </div>
            <div class="item">
              <h3 data-i18n="how.3.t"></h3>
              <p class="muted small" data-i18n="how.3.p"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section cta-band">
      <div class="container cta-inner">
        <div>
          <h2 data-i18n="cta.title"></h2>
          <p class="muted" data-i18n="cta.p"></p>
          <div class="socials" aria-label="Social links">
            <a data-social="instagram" href="#" title="Instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M17.5 6.6h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></a>
            <a data-social="youtube" href="#" title="YouTube" aria-label="YouTube"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8.2s-.2-1.5-.8-2.2c-.8-.9-1.7-.9-2.1-1C15.2 4.8 12 4.8 12 4.8h0s-3.2 0-6.1.2c-.4.1-1.3.1-2.1 1C3.2 6.7 3 8.2 3 8.2S2.8 10 2.8 11.9v.2C2.8 14 3 15.8 3 15.8s.2 1.5.8 2.2c.8.9 1.9.9 2.4 1 1.7.2 5.8.2 5.8.2s3.2 0 6.1-.2c.4-.1 1.3-.1 2.1-1 .6-.7.8-2.2.8-2.2s.2-1.8.2-3.7v-.2C21.2 10 21 8.2 21 8.2z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M10.5 9.3l5.2 2.7-5.2 2.7V9.3z" fill="currentColor"/></svg></a>
            <a data-social="linkedin" href="#" title="LinkedIn" aria-label="LinkedIn"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4.8a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" fill="currentColor"/><path d="M3 10h2.2v11H3V10z" fill="currentColor"/><path d="M8.1 10H10v1.5h.1c.3-.6 1.3-1.7 3.1-1.7 2.1 0 3.8 1.3 3.8 4.3V21h-2.2v-6c0-1.7-.6-2.8-2.1-2.8-1.1 0-1.8.7-2.1 1.4-.1.3-.1.7-.1 1.1V21H8.1V10z" fill="currentColor"/></svg></a>
          </div>
        </div>
        <div class="row wrap">
          <a class="btn primary" href="finder.html" data-i18n="landing.cta.start"></a>
          <a class="btn ghost" data-calendly href="#" data-i18n="call.btn"></a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/calendly.js"></script>
  <script src="assets/socials.js"></script>
  <script src="assets/hero-slider.js"></script>
  
  <script src="assets/nav.js"></script>

</body>
</html>
